name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please search [existing issues](https://github.com/gfargo/coco/issues) first to avoid duplicates.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: Running `coco commit` did X, but I expected Y.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands and conditions that trigger it.
      placeholder: |
        1. `git add .`
        2. `coco commit`
        3. See error …
    validations:
      required: true
  - type: dropdown
    id: command
    attributes:
      label: Which command?
      options:
        - commit
        - amend
        - changelog
        - recap
        - review
        - pr create
        - log
        - ui (workstation)
        - workspace
        - issues / prs
        - doctor / init
        - other / not sure
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: AI provider
      options:
        - OpenAI
        - Anthropic
        - Gemini
        - Mistral
        - Azure OpenAI
        - AWS Bedrock
        - Ollama (local)
        - not relevant
    validations:
      required: false
  - type: dropdown
    id: forge
    attributes:
      label: Git forge (if relevant)
      options:
        - GitHub
        - GitHub Enterprise
        - GitLab
        - GitLab self-managed
        - not relevant
    validations:
      required: false
  - type: textarea
    id: doctor
    attributes:
      label: Environment
      description: "Paste the output of `coco doctor` (redact anything sensitive), plus your OS and Node version."
      render: shell
      placeholder: |
        coco --version:
        node --version:
        OS:
        coco doctor: …
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant output, ideally with `--verbose`. Do NOT paste API keys, tokens, or proprietary diff content.
      render: shell
    validations:
      required: false
